# .github/workflows/deploy.yml
# This workflow builds the Vite app, runs tests (if any), and deploys to GitHub Pages on release creation.
# For more info: https://docs.github.com/en/pages/quickstart

name: Deploy to GitHub Pages

on:
  release:
    types: [created]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests (if available)
        run: npm test || echo "No tests defined, skipping..."

      - name: Build project
        env:
          CI: false
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist  # Vite build output folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
