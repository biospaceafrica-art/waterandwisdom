name: Water and Wisdom CI & Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy to AWS Lambda
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests (if available)
        run: npm test || echo "No tests defined, skipping..."

      - name: Build project
        env:
          CI: false
        run: npm run build

      # Only configure AWS + deploy on push to main
      - name: Configure AWS Credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::454518197747:role/WaterAndWisdomDeployRole
          aws-region: af-south-1
          role-session-name: GitHubActionsDeploy

      - name: Zip build artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: zip -r deployment.zip dist/

      - name: Deploy to Lambda
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          aws lambda update-function-code \
            --function-name water-and-wisdom-lambda \
            --zip-file fileb://deployment.zip
