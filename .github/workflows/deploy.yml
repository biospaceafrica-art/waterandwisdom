name: Deploy to AWS Lambda

on:
  push:
    branches: [ "main" ] # Deploys when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # This is crucial for OIDC
      contents: read    # Required to checkout your code

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/GitHubActionRole # Replace with your Role ARN
          aws-region: us-east-1 # Replace with your region (e.g., us-west-2)

      - name: Set up Node.js (or Python, etc.)
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --production

      - name: MyWebAppBackend
        uses: aws-actions/aws-lambda-deploy@v1
        with:
          function-name: MyWebAppBackend # Replace with your Lambda function name
          code-artifacts-dir: ./dist # The folder containing your built code
